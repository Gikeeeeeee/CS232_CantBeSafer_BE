services:
  db:
    image: postgres:15-alpine
    container_name: my-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432" # ใช้พอร์ต 5432 ตามที่คุณตั้งไว้
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_container
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db

  localstack:
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"            # พอร์ตหลักของ LocalStack
    environment:
      - SERVICES=s3           # บอกว่าขอใช้แค่ S3
      - DEBUG=1
      - LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT=1 # เพิ่มบรรทัดนี้เพื่อข้ามหน้า Login
      - AWS_ENDPOINT_URL=http://localstack:4566

  backend:
    # เปลี่ยนจาก image: my-node-app เป็นบรรทัดข้างล่างนี้
    build: .  
    container_name: my_backend_app
    env_file:
      - .env  # วิธีนี้จะดึงไฟล์ .env เข้าไปรวมใน Docker ทันที
    ports:
      - "3000:3000"
    depends_on:
      - db
      - localstack
volumes:
  postgres_data:
